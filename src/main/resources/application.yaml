spring:
  application:
    name: bookstore
  server:
    port: 8080

# H2 Database
  datasource:
#    url: jdbc:h2:mem:bookstore #;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    url: jdbc:h2:file:./data/bnpbookstore;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

# JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 30600000 # 30 minutes in milliseconds